spring.application.name=training-planner
# MongoDB connection string — overridable via the MONGO_URI environment variable
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/training_planner}
spring.threads.virtual.enabled=true

# JWT configuration (externalized via environment in production)
jwt.access-token.secret=${JWT_ACCESS_SECRET:training-planner-access-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.access-token.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token.expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Invite-only registration. Registration is DISABLED unless this is set.
# New users must provide a matching inviteCode in the register request.
app.invite-code=${INVITE_CODE:}

logging.level.com.trainingplanner=DEBUG

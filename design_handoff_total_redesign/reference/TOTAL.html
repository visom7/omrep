<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOTAL — powerlifting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.stage {
  min-height: 100dvh; width: 100%;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(120% 90% at 50% 0%, #1b1d22 0%, #0a0b0d 60%);
  padding: 20px;
  font-family: 'Archivo', system-ui, sans-serif;
}

/* ── device ───────────────────────────────────────────────── */
.device {
  width: 392px; height: min(852px, calc(100dvh - 40px));
  background: var(--bg);
  border-radius: 44px;
  border: 1px solid var(--border);
  box-shadow: 0 0 0 11px #1c1d20, 0 0 0 12px #2c2e33, 0 40px 90px -20px rgba(0,0,0,.8);
  position: relative; overflow: hidden;
  color: var(--text);
  display: flex; flex-direction: column;
}
.device__screen { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }

.statusbar {
  height: 50px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 30px 0 34px;
  font-family: var(--font-num); font-size: 14px; font-weight: 700;
}
.statusbar__time { letter-spacing: .02em; }
.statusbar__right { display: flex; align-items: center; gap: 6px; }

.appscroll { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
.appscroll::-webkit-scrollbar { display: none; }

/* ── bottom nav ───────────────────────────────────────────── */
.bottomnav {
  flex-shrink: 0; height: 78px;
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  backdrop-filter: blur(12px);
  padding-bottom: 12px;
}
.navitem {
  border: 0; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  color: var(--text-mute); font-family: var(--font-body);
  font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  position: relative; transition: color .15s;
}
.navitem--on { color: var(--accent); }
.navitem--on::before {
  content: ''; position: absolute; top: 0; width: 26px; height: 3px; border-radius: 0 0 3px 3px;
  background: var(--accent);
}

/* ── screens ──────────────────────────────────────────────── */
.screen { padding: 6px var(--pad) 28px; display: flex; flex-direction: column; min-height: 100%; }

.phead { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 0 18px; }
.phead--day { padding-top: 4px; }
.phead__kick { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--text-mute); margin-bottom: 5px; }
.phead__kick[data-pat] { color: var(--pat); }
.phead__h1 { font-family: var(--font-display); font-weight: 800; font-size: 30px; letter-spacing: -0.01em; line-height: 1; }

.streak {
  display: flex; align-items: center; gap: 5px; color: var(--accent);
  font-family: var(--font-num); font-weight: 700; font-size: 14px;
  border: 1px solid var(--border-2); border-radius: 999px; padding: 6px 11px;
}

/* pattern accents (calibrated-plate categorical hints) */
[data-pat="SQUAT"]    { --pat: #ff6a4d; }
[data-pat="BENCH"]    { --pat: #5b8cff; }
[data-pat="DEADLIFT"] { --pat: #1fc985; }
[data-pat="PRESS"]    { --pat: #d9a441; }

/* ── numbers ──────────────────────────────────────────────── */
.num { font-family: var(--font-num); font-variant-numeric: tabular-nums; font-weight: 700; letter-spacing: -0.01em; }
.num i { font-style: normal; font-size: .62em; font-weight: 400; opacity: .6; margin-left: 1px; }

/* ── tabs (block selector) ────────────────────────────────── */
.tabs { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; margin-bottom: 18px; padding-bottom: 2px; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; cursor: pointer; white-space: nowrap;
  padding: 9px 15px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-mute); font-family: var(--font-body); font-size: 13px; font-weight: 600;
  transition: all .15s;
}
.tab--on { border-color: var(--accent); color: var(--text); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }

/* ── week group + day cards ───────────────────────────────── */
.weekgrp { margin-bottom: 16px; }
.weekgrp__h { display: flex; align-items: center; gap: 10px; margin-bottom: 9px;
  font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-mute); }
.weekgrp__line { flex: 1; height: 1px; background: var(--border); }
.weekgrp__n { color: var(--text-mute); opacity: .8; }

.daycard {
  width: 100%; cursor: pointer; text-align: left;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px var(--pad); margin-bottom: var(--gap);
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  border-left: 3px solid var(--pat, var(--border-2));
  transition: border-color .15s, transform .08s;
}
.daycard:active { transform: scale(.99); }
.daycard--today { border-color: var(--accent); border-left-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.daycard__l { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.daycard__tag { font-family: var(--font-num); font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--pat); }
.daycard__name { font-family: var(--font-display); font-weight: 700; font-size: 17px; }
.daycard__meta { font-size: 12px; color: var(--text-mute); }
.daycard__r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.daycard__hoy { font-family: var(--font-num); font-size: 10px; font-weight: 700; letter-spacing: .1em;
  color: var(--on-accent); background: var(--accent); padding: 3px 7px; border-radius: var(--r-sm); }

/* ── day view ─────────────────────────────────────────────── */
.backbtn { display: flex; align-items: center; gap: 5px; cursor: pointer;
  background: none; border: 0; color: var(--text-mute); font-family: var(--font-body);
  font-size: 13px; font-weight: 600; padding: 8px 0; margin-bottom: 2px; }

.progressbar { position: relative; height: 30px; border-radius: var(--r-sm); overflow: hidden;
  background: var(--raised); border: 1px solid var(--border); margin-bottom: 20px;
  display: flex; align-items: center; }
.progressbar__fill { position: absolute; inset: 0 auto 0 0; background: color-mix(in srgb, var(--accent) 26%, transparent);
  border-right: 2px solid var(--accent); transition: width .35s cubic-bezier(.4,0,.2,1); }
.progressbar__lbl { position: relative; margin-left: 12px; font-family: var(--font-num); font-size: 12px; font-weight: 700; }

.seclabel { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-mute); margin: 4px 0 10px; }

.warm { margin-bottom: 18px; }
.warm__toggle { width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  padding: 12px var(--pad); background: var(--surface); border: 1px dashed var(--border-2); border-radius: var(--r-md);
  color: var(--text-mute); font-family: var(--font-body); font-size: 13px; font-weight: 600; }
.warm__toggle span { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.warm__list { margin-top: var(--gap); display: flex; flex-direction: column; gap: 1px; border-radius: var(--r-md); overflow: hidden; }
.warm__row { display: flex; align-items: center; justify-content: space-between; padding: 11px var(--pad);
  background: var(--surface); font-size: 13px; color: var(--text-mute); }
.warm__row .num { color: var(--text); font-size: 13px; }

/* ── set rows ─────────────────────────────────────────────── */
.sets { display: flex; flex-direction: column; gap: var(--gap); }
.setrow { width: 100%; cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 13px; min-height: var(--row);
  padding: 12px var(--pad); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  transition: border-color .15s, transform .08s; }
.setrow:active { transform: scale(.99); }
.setrow--done { opacity: .58; }
.setrow__check { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border-2); display: flex; align-items: center; justify-content: center; transition: all .15s; }
.setrow__check--on { background: var(--accent); border-color: var(--accent); }
.setrow__info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.setrow__ex { font-family: var(--font-display); font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px; }
.basicdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
.setrow__meta { font-size: 11.5px; color: var(--text-mute); }
.setrow__load { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.setrow__rep { font-size: 13px; color: var(--text-mute); }
.setrow__kg { font-size: 23px; color: var(--accent); line-height: 1; }
.platebar { display: flex; align-items: flex-end; gap: 2px; height: 12px; margin-top: 3px; }
.platebar__t { width: 3px; border-radius: 1px; }

.oneRmStrip { margin-top: 18px; display: flex; align-items: center; justify-content: space-between;
  padding: 14px var(--pad); border-radius: var(--r-md); border: 1px solid var(--border-2);
  background: repeating-linear-gradient(135deg, transparent 0 8px, color-mix(in srgb, var(--accent) 5%, transparent) 8px 9px), var(--surface);
  font-size: 13px; color: var(--text-mute); }
.oneRmStrip b { font-size: 22px; color: var(--text); }

/* ── log form ─────────────────────────────────────────────── */
.logform { background: var(--raised); border: 1px solid var(--accent); border-radius: var(--r-md); padding: 16px var(--pad); }
.logform__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.logform__head .est { font-size: 12px; color: var(--accent); }
.logform__grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-bottom: 14px; }
.stepper { display: flex; flex-direction: column; gap: 6px; }
.stepper__l { font-family: var(--font-num); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-mute); text-align: center; }
.stepper__ctl { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px; }
.stepper__ctl button { width: 30px; height: 34px; border: 0; background: none; cursor: pointer; color: var(--text);
  font-size: 22px; font-weight: 400; line-height: 1; border-radius: var(--r-sm); }
.stepper__ctl button:active { background: var(--raised); }
.stepper__ctl .num { font-size: 17px; }
.logform__act { display: flex; gap: 9px; }

/* ── buttons ──────────────────────────────────────────────── */
.btn { cursor: pointer; border: 0; border-radius: var(--r-md); font-family: var(--font-body);
  font-weight: 700; font-size: 14px; padding: 13px 18px; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  white-space: nowrap; transition: transform .08s, filter .15s; }
.btn:active { transform: scale(.98); }
.btn--accent { background: var(--accent); color: var(--on-accent); flex: 1; }
.btn--accent:hover { filter: brightness(1.05); }
.btn--ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border-2); flex: 1; }
.btn--lg { padding: 16px; font-size: 15px; width: 100%; }
.btn--full { width: 100%; margin-top: 18px; }

.iconbtn { width: 42px; height: 42px; border-radius: var(--r-md); border: 1px solid var(--border-2);
  background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
.iconbtn--accent { background: var(--accent); border-color: var(--accent); }

/* ── chips ────────────────────────────────────────────────── */
.chip { cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-2); background: var(--surface);
  color: var(--text-mute); font-family: var(--font-body); font-size: 12px; font-weight: 600; }
.chip--on { border-color: var(--accent); color: var(--text); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }

/* ── blocks ───────────────────────────────────────────────── */
.blocklist { display: flex; flex-direction: column; gap: var(--gap); }
.blockcard { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
.blockcard--on { border-color: var(--accent); }
.blockcard__bar { width: 4px; background: var(--border-2); flex-shrink: 0; }
.blockcard--on .blockcard__bar { background: var(--accent); }
.blockcard__body { flex: 1; padding: 15px var(--pad); }
.blockcard__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.blockcard__name { font-family: var(--font-display); font-weight: 700; font-size: 16px; line-height: 1.25; }
.badge { font-family: var(--font-num); font-size: 9px; font-weight: 700; letter-spacing: .1em;
  color: var(--on-accent); background: var(--accent); padding: 3px 7px; border-radius: var(--r-sm); flex-shrink: 0; }
.blockcard__stats { display: flex; gap: 18px; margin-bottom: 14px; font-size: 12px; color: var(--text-mute); align-items: baseline; white-space: nowrap; }
.blockcard__stats b { font-size: 18px; color: var(--text); margin-right: 3px; }
.blockcard__act { display: flex; gap: 8px; }

/* ── progress / total card ────────────────────────────────── */
.totalcard { border: 1px solid var(--border-2); border-radius: var(--r-lg); padding: 20px var(--pad); margin-bottom: 16px;
  background:
    radial-gradient(140% 100% at 100% 0%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 60%),
    var(--surface); }
.totalcard__l { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .14em; color: var(--text-mute); }
.totalcard__big { display: flex; align-items: baseline; gap: 4px; margin: 6px 0 4px; }
.totalcard__big .num { font-size: 58px; line-height: .9; letter-spacing: -0.03em; color: var(--text); }
.totalcard__big i { font-family: var(--font-num); font-style: normal; font-size: 18px; color: var(--text-mute); }
.totalcard__delta { font-size: 13px; color: var(--accent); }
.totalcard__split { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.totalcard__split div { display: flex; flex-direction: column; gap: 3px; }
.totalcard__split span { font-family: var(--font-num); font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--pat, var(--text-mute)); }
.totalcard__split b { font-size: 22px; font-family: var(--font-num); }

.segmented { display: flex; background: var(--raised); border: 1px solid var(--border); border-radius: var(--r-md); padding: 4px; gap: 4px; margin-bottom: 14px; }
.segmented__b { flex: 1; cursor: pointer; border: 0; background: none; border-radius: calc(var(--r-md) - 4px);
  padding: 9px; font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text-mute); transition: all .15s; }
.segmented__b--on { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.3); }

.exchips { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }

.chartcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px var(--pad) 12px; }
.chartcard__cap { font-size: 11px; color: var(--text-mute); margin-top: 8px; text-align: center; }

/* ── settings ─────────────────────────────────────────────── */
.profile { display: flex; align-items: center; gap: 14px; padding: 16px var(--pad); margin-bottom: 22px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); }
.profile__av { width: 50px; height: 50px; border-radius: var(--r-md); background: var(--accent); color: var(--on-accent);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 22px; }
.profile div { display: flex; flex-direction: column; gap: 2px; }
.profile b { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
.profile span { font-size: 13px; color: var(--text-mute); }

.formulas { display: flex; flex-direction: column; gap: var(--gap); margin-bottom: 22px; }
.formula { width: 100%; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 13px;
  padding: 14px var(--pad); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); transition: border-color .15s; }
.formula--on { border-color: var(--accent); }
.formula div { display: flex; flex-direction: column; gap: 3px; }
.formula b { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.formula span { font-size: 12px; color: var(--text-mute); }
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-2); flex-shrink: 0; position: relative; transition: all .15s; }
.radio--on { border-color: var(--accent); }
.radio--on::after { content: ''; position: absolute; inset: 4px; border-radius: 50%; background: var(--accent); }

/* ── fields ───────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.field--row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px var(--pad); }
.field__l { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-mute); }
.field__i { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 13px var(--pad); color: var(--text); font-family: var(--font-body); font-size: 15px; }
.field--row .field__i { background: none; border: 0; padding: 6px 0 0; }
.field__i:focus { outline: none; border-color: var(--accent); }

/* ── auth ─────────────────────────────────────────────────── */
.screen--auth { justify-content: center; padding: var(--pad) 26px 40px; }
.auth__brand { text-align: center; margin-bottom: 38px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.auth__word { font-family: var(--font-display); font-weight: 800; font-size: 46px; letter-spacing: .12em; }
.auth__tag { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .22em; color: var(--text-mute); }
.auth__form { display: flex; flex-direction: column; }
.auth__alt { text-align: center; font-size: 13px; color: var(--text-mute); margin-top: 16px; }
.auth__alt b { color: var(--text); }
.auth__foot { text-align: center; font-family: var(--font-num); font-size: 10px; letter-spacing: .12em;
  color: var(--text-mute); opacity: .6; margin-top: 38px; }
.auth__brand--sm { margin-bottom: 28px; }

/* ── full-screen overlay (editor) ─────────────────────────── */
.overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column;
  animation: slideUp .28s cubic-bezier(.16,1,.3,1); z-index: 40; }
@keyframes slideUp { from { transform: translateY(18px); } to { transform: none; } }
.overlay__bar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 8px var(--pad); border-bottom: 1px solid var(--border); }
.overlay__crumb { font-family: var(--font-num); font-size: 11px; font-weight: 700; letter-spacing: .1em; color: var(--text-mute); }
.overlay__scroll { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 16px var(--pad) 32px; }
.overlay__scroll::-webkit-scrollbar { display: none; }
.btn--pill { flex: 0; padding: 9px 18px; border-radius: 999px; }
.field__i--big { font-family: var(--font-display); font-weight: 700; font-size: 18px; }

.weekedit { margin-bottom: 18px; }
.weekedit .daycard { border-left-width: 3px; }

/* add buttons */
.addbtn { width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 12px; margin-top: var(--gap); border-radius: var(--r-md); border: 1px dashed var(--border-2);
  background: none; color: var(--text-mute); font-family: var(--font-body); font-size: 13px; font-weight: 600; }
.addbtn:active { border-color: var(--accent); color: var(--text); }
.addbtn--solid { border-style: solid; background: var(--surface); margin-top: 14px; }

/* entry card (day editor) */
.entrycard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px var(--pad); margin-bottom: var(--gap); }
.entrycard__h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.entrycard__name { font-family: var(--font-display); font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px;
  border-left: 3px solid var(--pat, var(--border-2)); padding-left: 9px; }
.iconbtn--sm { width: 30px; height: 30px; font-size: 14px; border-radius: var(--r-sm); color: var(--text-mute); }
.sglist { display: flex; flex-direction: column; gap: 6px; }
.sgrow { width: 100%; cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left;
  padding: 9px 11px; background: var(--raised); border: 1px solid var(--border); border-radius: var(--r-sm); }
.sgrow__txt { flex: 1; font-size: 14px; }
.sgrow__txt i { font-style: normal; opacity: .5; margin: 0 2px; }
.sgrow__rpe { font-size: 11px; color: var(--text-mute); }
.pill { font-family: var(--font-num); font-size: 9px; font-weight: 700; letter-spacing: .08em; padding: 3px 6px; border-radius: 4px; flex-shrink: 0; }
.pill--warm { background: color-mix(in srgb, var(--text-mute) 22%, transparent); color: var(--text-mute); }
.pill--work { background: var(--accent); color: var(--on-accent); }
.sgadd { display: flex; gap: 8px; margin-top: 11px; }

.logform--sg { margin: 2px 0; padding: 13px; }
.logform__grid--4 { grid-template-columns: repeat(4, 1fr); gap: 6px; }

.stepper__ctl--sm .num { font-size: 14px; }
.typetoggle { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 3px; width: 100%; }
.typetoggle button { flex: 1; cursor: pointer; border: 0; background: none; border-radius: calc(var(--r-sm)); padding: 7px;
  font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text-mute); }
.typetoggle button.on { background: var(--raised); color: var(--text); }
.btn--danger { color: #ff6a4d; border-color: color-mix(in srgb, #ff6a4d 40%, var(--border-2)); }

.emptyhint { color: var(--text-mute); font-size: 13px; text-align: center; padding: 14px 0; }

/* ── bottom sheets ────────────────────────────────────────── */
.sheetwrap { position: absolute; inset: 0; z-index: 50; }
.sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); opacity: 0; transition: opacity .22s; }
.sheetwrap--on .sheet-backdrop { opacity: 1; }
.sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg);
  border-top: 1px solid var(--border-2); border-radius: var(--r-lg) var(--r-lg) 0 0;
  padding: 8px var(--pad) calc(var(--pad) + 6px); max-height: 88%; display: flex; flex-direction: column;
  transform: translateY(102%); transition: transform .26s cubic-bezier(.16,1,.3,1); }
.sheetwrap--on .sheet { transform: none; }
.sheet__handle { width: 38px; height: 4px; border-radius: 4px; background: var(--border-2); margin: 6px auto 8px; cursor: pointer; }
.sheet__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sheet__title { font-family: var(--font-display); font-weight: 800; font-size: 19px; }
.sheet__close { width: 30px; height: 30px; border: 0; background: var(--surface); border-radius: 50%; color: var(--text-mute); cursor: pointer; font-size: 13px; }
.sheet__body { overflow-y: auto; scrollbar-width: none; }
.sheet__body::-webkit-scrollbar { display: none; }
.sheet__foot { padding-top: 14px; display: flex; gap: 9px; }
.sheet__foot .btn { width: 100%; }
.sheet__sub { font-size: 13px; color: var(--text-mute); margin-bottom: 16px; line-height: 1.5; }
.sheet__sub b, .sheet__title b { color: var(--text); }

.search { margin-bottom: 10px; }
.picklist { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.pickitem { width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  padding: 12px var(--pad); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); text-align: left; }
.pickitem:active { border-color: var(--accent); }
.pickitem__l { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.pickitem__name { font-family: var(--font-display); font-weight: 700; font-size: 15px; line-height: 1.2; display: flex; align-items: center; gap: 6px; }
.pickitem__pat { font-family: var(--font-num); font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--pat, var(--text-mute)); }

.patgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.patbtn { cursor: pointer; padding: 10px 6px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface);
  color: var(--text-mute); font-family: var(--font-body); font-size: 12px; font-weight: 600; }
.patbtn--on { border-color: var(--pat, var(--accent)); color: var(--text); background: color-mix(in srgb, var(--pat, var(--accent)) 12%, var(--surface)); }

.toggle-row { width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  padding: 13px var(--pad); margin-top: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); text-align: left; }
.toggle-row div { display: flex; flex-direction: column; gap: 2px; }
.toggle-row b { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
.toggle-row span { font-size: 12px; color: var(--text-mute); }
.switch { width: 42px; height: 25px; border-radius: 999px; background: var(--raised); border: 1px solid var(--border-2); position: relative; flex-shrink: 0; transition: background .15s; }
.switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; border-radius: 50%; background: var(--text-mute); transition: transform .15s, background .15s; }
.switch--on { background: var(--accent); border-color: var(--accent); }
.switch--on::after { transform: translateX(17px); background: var(--on-accent); }

.linkback { width: 100%; background: none; border: 0; color: var(--text-mute); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; padding: 14px 0 4px; }

.optlist { display: flex; flex-direction: column; gap: 8px; }
.optrow { width: 100%; cursor: pointer; display: flex; align-items: center; gap: 13px; text-align: left;
  padding: 14px var(--pad); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); }
.optrow--on { border-color: var(--accent); }
.optrow div { display: flex; flex-direction: column; gap: 3px; }
.optrow b { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.optrow span { font-size: 12px; color: var(--text-mute); }

.exportstat { display: flex; align-items: center; justify-content: space-between; margin-top: 18px;
  padding: 14px var(--pad); border-radius: var(--r-md); border: 1px solid var(--border-2); background: var(--surface);
  font-size: 13px; color: var(--text-mute); }

.okstate { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 0 6px; }
.okstate__ring { width: 64px; height: 64px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
.okstate b { font-family: var(--font-display); font-weight: 800; font-size: 18px; }
.okstate span { font-size: 13px; color: var(--text-mute); }
